<!doctype html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sin conexion - Automatismos Marpel</title>
    <style>
        body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f6f8fb;color:#172033}
        main{min-height:100vh;display:grid;place-items:center;padding:24px}

        h1{font-size:24px;margin:0 0 8px}
        p{line-height:1.5;color:#667085}

<body>
<main>
    <section>
        <h1>Sin conexion</h1>
        <p>Los trabajos abiertos recientemente quedan disponibles. Cuando vuelva la cobertura, recarga la pantalla para sincronizar cambios.</p>
    </section>
</main>
</body>
</html>
